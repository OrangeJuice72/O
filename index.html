<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b1020">
  <link rel="apple-touch-icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f3b0/512.webp">
  
  <title>Creative Muse</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --text:#eaf0ff;
      --muted:#a9b6e6;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --accent: #ffd166;
      --accent-glow: rgba(255, 209, 102, 0.3);
      --item-height: 80px;
    }
    *{box-sizing:border-box}

    html {
      background-color: #0b1020; 
      overscroll-behavior: none; 
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body{
      margin:0;
      min-height:100vh;
      overscroll-behavior: none;
      display:flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(-45deg, #070b14, #1b1233, #081519, #0a1126);
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
      color:var(--text);
      font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x: hidden;
      padding: 40px 20px;
    }
    
    .wrap{
      width: min(1000px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      position: relative;
      z-index: 10;
    }

    .header-text {
      text-align: center;
      margin-bottom: 10px;
    }
    h1{ font-size:28px; margin:0 0 8px; letter-spacing:.5px; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
    p{ margin:0; color:var(--muted); font-size: 15px; }

    .card{
      background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.15);
      border-radius:24px;
      padding:24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      width: 100%;
    }
    
    /* SLOT MACHINE STYLES */
    .slot-container {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .slot-machine {
      display: flex;
      gap: 6px;
      background: linear-gradient(180deg, #2a324a, #080b14);
      padding: 20px;
      border-radius: 28px;
      border: 3px solid rgba(255,209,102,0.3);
      box-shadow: 
        0 50px 100px rgba(0,0,0,0.9),
        inset 0 10px 20px rgba(255,255,255,0.1),
        inset 0 -10px 30px rgba(0,0,0,0.9),
        0 0 40px rgba(255, 209, 102, 0.1);
      position: relative;
      transition: transform 0.1s;
    }

    @keyframes clunkShake {
      0% { transform: translateY(0) scale(1); }
      25% { transform: translateY(4px) scale(0.99); }
      50% { transform: translateY(-2px) scale(1.005); }
      75% { transform: translateY(1px) scale(0.995); }
      100% { transform: translateY(0) scale(1); }
    }
    .shake { animation: clunkShake 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }

    .slot-machine::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: var(--item-height);
      transform: translateY(-50%);
      border-top: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      background: linear-gradient(90deg, rgba(255,209,102,0.0), rgba(255,209,102,0.1) 50%, rgba(255,209,102,0.0));
      box-shadow: 0 0 20px var(--accent-glow);
      pointer-events: none;
      z-index: 10;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    @keyframes jackpotFlash {
      0%, 100% { box-shadow: 0 0 20px var(--accent-glow); background: linear-gradient(90deg, rgba(255,209,102,0.0), rgba(255,209,102,0.1) 50%, rgba(255,209,102,0.0)); }
      50% { box-shadow: 0 0 40px rgba(255,209,102,0.6); background: linear-gradient(90deg, rgba(255,209,102,0.0), rgba(255,209,102,0.3) 50%, rgba(255,209,102,0.0)); }
    }
    .flash-payline::after { animation: jackpotFlash 0.8s ease-in-out 2; }

    .reel-window {
      width: 140px; 
      height: calc(var(--item-height) * 3);
      background: #04060a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 20px 40px rgba(0,0,0,1);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .reel-window::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 20%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0.95) 100%);
      pointer-events: none;
      z-index: 8;
    }
    .reel-window::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none;
      z-index: 7;
    }

    .reel-strip { display: flex; flex-direction: column; width: 100%; }

    .slot-item {
      height: var(--item-height);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px; 
      font-weight: 900;
      font-family: 'Impact', 'Arial Black', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #fff;
      text-align: center;
      padding: 0 4px;
      text-shadow: 0 3px 6px rgba(0,0,0,0.8);
      white-space: nowrap;
      z-index: 2;
    }

    .spinning .reel-strip { filter: blur(2px); }
    
    /* SPIN & RESULT LAYOUT */
    .action-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 600px;
      gap: 16px;
    }
    
    button.main-spin {
      width: 100%;
      border: 0;
      border-radius: 100px;
      cursor: pointer;
      font-weight: 800;
      color: #0b1020;
      background: linear-gradient(180deg, #ffe08a, #ffba08);
      box-shadow: 0 6px 0 #cc8b00, 0 15px 25px rgba(255,209,102,.2);
      transition: transform .1s ease, box-shadow .1s ease, filter .2s;
      font-size: 22px;
      padding: 20px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      touch-action: manipulation; 
    }
    button.main-spin:hover { filter: brightness(1.1); }
    button.main-spin:active, button.main-spin:disabled { 
      transform: translateY(6px); 
      box-shadow: 0 0px 0 #cc8b00, 0 5px 10px rgba(255,209,102,.2); 
    }
    button.main-spin:disabled { filter: grayscale(0.8) brightness(0.7); cursor: not-allowed; }
    
    .result{
      padding:20px;
      border-radius:20px;
      border:1px solid rgba(138,92,255,.4);
      background: rgba(138,92,255,.15);
      display:flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap:8px;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(138,92,255,0.1);
    }
    .result.win-pop {
      transform: scale(1.03);
      border-color: var(--accent);
      background: rgba(255, 209, 102, 0.15);
      box-shadow: 0 0 30px rgba(255,209,102,0.2);
    }

    .result-text { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    .result b{ font-size:18px; color: #fff; line-height: 1.4; transition: color 0.3s; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: 800; display: block; word-wrap: break-word; }

    /* CATEGORIES GRID */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      width: 100%;
    }

    .field{
      display:flex;
      flex-direction: column;
      gap:8px;
      padding:16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.3);
    }
    .field label{
      font-size:12px;
      letter-spacing:.5px;
      color:var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
    }
    
    select, textarea{
      border-radius:12px;
      padding:12px 10px;
      background: rgba(12, 16, 30, 0.8);
      border:1px solid rgba(255,255,255,.2);
      color:var(--text);
      outline:none;
      width: 100%;
      font-weight: 600;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
      text-align: center;
    }
    select option { text-align: left; }
    textarea{ min-height:100px; resize:vertical; font-family: inherit; text-align: left; }
    textarea:focus{ border-color: var(--accent); }
    
    button.ghost{
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.4);
      transition: all 0.1s ease;
    }
    button.ghost:hover { background: rgba(255,255,255,0.1); }
    button.ghost:active { transform: translateY(4px); box-shadow: 0 0px 0 rgba(0,0,0,0.4); }
    
    /* EDIT LAB */
    .edit-lab {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    .edit-lab-header { display: flex; justify-content: space-between; align-items: center; }
    .edit-lab label { font-size: 16px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
    .edit-lab .controls { display: flex; gap: 10px; align-items: center; }
    .edit-lab select { padding: 10px 14px; font-size: 14px; width: auto; text-align: left; }
    .edit-lab button { padding: 10px 20px; font-size: 14px; }

    /* MOBILE TWEAKS */
    @media (max-width: 900px) {
      .categories-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      :root { var(--item-height): 60px; }
      body { padding: 20px 10px; }
      .wrap { gap: 24px; }
      .card { padding: 16px; border-radius: 20px; }
      .slot-machine { padding: 10px; gap: 4px; border-radius: 16px; }
      
      .reel-window { width: 17vw; border-radius: 8px; }
      .slot-item { font-size: 10px; letter-spacing: -0.5px; padding: 0 1px; }
      
      h1 { font-size: 24px; }
      button.main-spin { font-size: 18px; padding: 16px; }
      
      .categories-grid { grid-template-columns: repeat(2, 1fr); }
      .categories-grid .field:last-child { grid-column: span 2; } 
      
      .edit-lab { padding: 16px; }
      .edit-lab-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .edit-lab .controls { width: 100%; display: grid; grid-template-columns: 1fr auto; }
    }
  </style>
</head>

  <script>
    // --- GENTLE SYNTHESIZED SOUND EFFECTS ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTick() {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle'; 
      osc.frequency.setValueAtTime(600 + (Math.random() > 0.5 ? 20 : 0), audioCtx.currentTime);
      gain.gain.setValueAtTime(0.005, audioCtx.currentTime); 
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.03);
    }

    function playClunk() {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator(); 
      const gain = audioCtx.createGain();
      
      osc.type = 'sine'; 
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);

      gain.gain.setValueAtTime(0.15, audioCtx.currentTime); 
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    }

    function playWinChime() {
      if(!audioCtx) return;
      const notes = [523.25, 659.25, 783.99]; // C, E, G
      notes.forEach((freq, i) => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.6);
        }, i * 150); 
      });
    }

    let tickerInterval = null;

    // --- MASSIVE IDEA DICTIONARIES ---

    const spinBtn = document.getElementById("spinBtn");

    class SlotReel {
      constructor(windowId, stripId) {
        this.windowEl = document.getElementById(windowId);
        this.stripEl = document.getElementById(stripId);
        this.currentCategory = [];
        this.currentWinner = "?";
        this.spinning = false;
      }

      loadCategory(catKey) {
        this.currentCategory = categoryData[catKey] || categoryData["styles"];
        this.currentWinner = this.currentCategory[Math.floor(Math.random() * this.currentCategory.length)];
        this.renderStatic();
      }

      renderStatic() {
        this.stripEl.style.transition = "none";
        this.stripEl.style.transform = `translateY(0px)`;
        const prev = this.getRandomItem();
        const next = this.getRandomItem();
        this.stripEl.innerHTML = `
          <div class="slot-item" style="color: #475569">${prev}</div>
          <div class="slot-item" style="color: #fff">${this.currentWinner}</div>
          <div class="slot-item" style="color: #475569">${next}</div>
        `;
      }

      getRandomItem() { return this.currentCategory[Math.floor(Math.random() * this.currentCategory.length)]; }

      spin(duration, onComplete) {
        if(this.spinning) return;
        this.spinning = true;
        this.windowEl.classList.add("spinning");

        const numSpins = Math.floor(duration / 100); 
        const newWinner = this.getRandomItem();
        
        const computedHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--item-height')) || 80;
        
        let html = `
          <div class="slot-item" style="color: #475569">${this.getRandomItem()}</div>
          <div class="slot-item" style="color: #fff">${this.currentWinner}</div>
        `;
        
        const hueShift = Math.floor(Math.random() * 360);
        for(let i=0; i<numSpins; i++) {
          const color = `hsl(${(hueShift + i*10) % 360}, 90%, 65%)`;
          html += `<div class="slot-item" style="color: ${color}">${this.getRandomItem()}</div>`;
        }
        
        html += `
          <div class="slot-item" style="color: #ffd166">${newWinner}</div>
          <div class="slot-item" style="color: #475569">${this.getRandomItem()}</div>
        `;

        this.stripEl.style.transition = "none";
        this.stripEl.style.transform = `translateY(0px)`;
        this.stripEl.innerHTML = html;

        void this.stripEl.offsetHeight; 

        this.stripEl.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0.85, 0.2, 1)`;
        const targetOffset = (numSpins + 1) * computedHeight;
        this.stripEl.style.transform = `translateY(-${targetOffset}px)`;

        setTimeout(() => {
          this.spinning = false;
          this.currentWinner = newWinner;
          this.windowEl.classList.remove("spinning");
          this.renderStatic(); 
          
          playClunk();
          machineObj.classList.remove("shake");
          void machineObj.offsetWidth; 
          machineObj.classList.add("shake");
          
          if (onComplete) onComplete();
        }, duration);
      }
    }

    saveCatBtn.addEventListener("click", () => {
      const selectedCat = editCatSelect.value;
      const newItems = editCatText.value.split("\n").map(s => s.trim()).filter(Boolean);
      if (newItems.length === 0) newItems.push("Empty! 🤷");
      
      categoryData[selectedCat] = newItems;
      if (cat1.value === selectedCat) r1.loadCategory(selectedCat);
      if (cat2.value === selectedCat) r2.loadCategory(selectedCat);
      if (cat3.value === selectedCat) r3.loadCategory(selectedCat);
      if (cat4.value === selectedCat) r4.loadCategory(selectedCat);
      if (cat5.value === selectedCat) r5.loadCategory(selectedCat);
      
      const originalText = saveCatBtn.textContent;
      saveCatBtn.textContent = "Saved! 🎉";
      saveCatBtn.style.color = "#ffd166";
      setTimeout(() => { saveCatBtn.textContent = originalText; saveCatBtn.style.color = ""; }, 1500);
    });

    function updateResultText() {
      lastResultEl.innerHTML = `
        <span style="color:${r1.spinning ? 'var(--muted)' : '#ffd166'}">${r1.currentWinner}</span>, 
        <span style="color:${r2.spinning ? 'var(--muted)' : '#ffd166'}">${r2.currentWinner}</span>,

        <span style="color:${r5.spinning ? 'var(--muted)' : '#ffd166'}">${r5.currentWinner}</span>
      `;
    }
    updateResultText();

    function spinAll() {
      if(r1.spinning || r2.spinning || r3.spinning || r4.spinning || r5.spinning) return;
      
      initAudio(); 
      
      spinBtn.disabled = true;
      resultBox.classList.remove("win-pop");
      machineObj.classList.remove("flash-payline");
      
      r1.currentWinner = "•••"; r2.currentWinner = "•••"; r3.currentWinner = "•••"; 
      r4.currentWinner = "•••"; r5.currentWinner = "•••";
      updateResultText();

      if(tickerInterval) clearInterval(tickerInterval);
      tickerInterval = setInterval(playTick, 80); 

      r1.spin(3500, () => { updateResultText(); });
      r2.spin(4500, () => { updateResultText(); });
      r3.spin(5500, () => { updateResultText(); });
      r4.spin(6500, () => { updateResultText(); });
      r5.spin(7500, () => { 
        updateResultText(); 
        spinBtn.disabled = false; 
        
        clearInterval(tickerInterval);
        playWinChime();
        resultBox.classList.add("win-pop");
        machineObj.classList.add("flash-payline");
      });
    }
